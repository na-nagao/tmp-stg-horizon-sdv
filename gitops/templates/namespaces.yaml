---
# Allow any pod in argo-events to reach EventBus (NATS) in same namespace (EventSource/Sensor pods)
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-events-to-eventbus
  namespace: {{ .Values.config.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}argo-events
    ports:
    - protocol: TCP
      port: 4222   # NATS client
    - protocol: TCP
      port: 6222   # NATS cluster
    - protocol: TCP
      port: 8222   # NATS monitoring
{{- end }}
---
# Allow pods in argo-events to receive NATS traffic from same namespace (EventBus accepts from EventSource/Sensor)
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-events-ingress-to-eventbus
  namespace: {{ .Values.config.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 4222   # NATS client
    - protocol: TCP
      port: 6222   # NATS cluster
    - protocol: TCP
      port: 8222   # NATS monitoring
{{- end }}
---
# Allow all pods in argo-events to reach Kubernetes API (10.x.x.x:443) and internet (80/443)
# Required for Sensor k8s triggers (create Pod via API) and controller-created pods without part-of label
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-events-egress-to-internet
  namespace: {{ .Values.config.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443    # HTTPS + Kubernetes API
    - protocol: TCP
      port: 80     # HTTP
{{- end }}
