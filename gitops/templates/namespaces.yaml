---
# Allow Prometheus internet egress (for OS updates, not scraping)
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress-to-internet
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443    # HTTPS
    - protocol: TCP
      port: 80     # HTTP
{{- end }}
---
# GKE Managed Service for Prometheus query frontend: Workload Identity uses the
# instance metadata service (169.254.169.254:80) to obtain tokens for
# monitoring.googleapis.com. allow-prometheus-egress-to-internet excludes
# 169.254.169.254/32 from 0.0.0.0/0, so that component cannot reach the GKE
# metadata proxy; queries then return 500. Allow both well-known link-local
# metadata addresses (see allow-workflows-to-metadata-server in argo-workflows).
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress-to-gke-metadata
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
    - ipBlock:
        cidr: 169.254.169.252/32
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 988
{{- end }}
