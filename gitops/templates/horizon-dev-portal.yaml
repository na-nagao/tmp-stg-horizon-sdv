apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}horizon-dev-portal
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    # After keycloak-post-horizon-api (wave 5) — that job creates horizon-dev-portal-secrets with CI client secret.
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv

  source:
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}

    helm:
      values: |
        config:
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          gitops:
            horizonDevPortal: {{ .Values.config.containerImages.horizondevelopmentportal | quote }}
          #domain: {{ .Values.config.domain | quote }}
          domain: cdc.horizon-sdv-stg
          publicPath: {{ .Values.config.horizonDevelopmentPortal.publicPath | quote }}
          #publicBaseUrl: "https://{{ .Values.config.domain }}"
          publicBaseUrl: https://cdc.horizon-sdv-stg
          keycloakRealm: {{ .Values.config.horizonDevelopmentPortal.keycloakRealm | quote }}
          keycloakHttpPathPrefix: {{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix | quote }}
          #oidcIssuerUrl: "https://{{ .Values.config.domain }}{{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix }}/realms/{{ .Values.config.horizonDevelopmentPortal.keycloakRealm }}"
          oidcIssuerUrl: "https://cdc.horizon-sdv-stg{{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix }}/realms/{{ .Values.config.horizonDevelopmentPortal.keycloakRealm }}"
          #keycloakTokenUrl: "https://{{ .Values.config.domain }}{{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix }}/realms/{{ .Values.config.horizonDevelopmentPortal.keycloakRealm }}/protocol/openid-connect/token"
          keycloakTokenUrl: "https://{{ .Values.config.domain }}{{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix }}/realms/{{ .Values.config.horizonDevelopmentPortal.keycloakRealm }}/protocol/openid-connect/token"
          keycloakTokenPath: "{{ .Values.config.horizonDevelopmentPortal.keycloakHttpPathPrefix }}/realms/{{ .Values.config.horizonDevelopmentPortal.keycloakRealm }}/protocol/openid-connect/token"
          keycloakClientId: {{ .Values.config.horizonDevelopmentPortal.keycloakClientId | quote }}
          horizonApiCiClientId: {{ .Values.config.horizonDevelopmentPortal.horizonApiCiClientId | quote }}
          horizonApiBaseUrl: {{ if .Values.config.horizonDevelopmentPortal.horizonApiInternalBaseUrl }}{{ .Values.config.horizonDevelopmentPortal.horizonApiInternalBaseUrl | quote }}{{ else }}"http://horizon-api.{{ .Values.config.namespacePrefix }}horizon-api.svc.cluster.local"{{ end }}
          moduleManagerBaseUrl: {{ if .Values.config.horizonDevelopmentPortal.moduleManagerInternalBaseUrl }}{{ .Values.config.horizonDevelopmentPortal.moduleManagerInternalBaseUrl | quote }}{{ else }}"http://module-manager.{{ .Values.config.namespacePrefix }}module-manager.svc.cluster.local:8082"{{ end }}
        secret:
          horizonApiCiClientSecret: ""
        spec:
          source:
            repoURL: {{ .Values.spec.source.repoURL | quote }}
            targetRevision: {{ .Values.spec.source.targetRevision | quote }}
    path: gitops/apps/horizon-dev-portal
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}horizon-dev-portal

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}

  ignoreDifferences:
    - kind: ConfigMap
      name: {{ .Values.config.namespacePrefix }}horizon-dev-portal-config
      namespace: {{ .Values.config.namespacePrefix }}horizon-dev-portal
