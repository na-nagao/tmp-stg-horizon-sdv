apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}argo-events
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    chart: argo-events
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: {{ .Values.config.chartVersions.argoEvents.version | quote }}
    helm:
      values: |
        # Cluster-wide installation (cluster-admin role in use): controller watches all namespaces.
        # Chart uses ClusterRole/ClusterRoleBinding when namespaced is false.
        controller:
          namespaced: false
        crds:
          install: true
        # EventBus + EventSource are managed by a dedicated child Application:
        # gitops/templates/argo-events-resources.yaml (wave 5). Keep argo-events
        # at wave 4 so CRDs are ready before EventBus/EventSource are applied.
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}argo-events
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
---
# NetworkPolicy: allow webhook EventSource ingress on port 12000 (sensors in argo-events + Horizon API submit).
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: {{ .Values.config.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      eventsource-name: webhook
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}argo-events
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}horizon-api
      ports:
        - protocol: TCP
          port: 12000
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensor-submit-workflow
  namespace: {{ .Values.config.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.config.namespacePrefix }}argo-events-sensor-clusterworkflowtemplates
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - clusterworkflowtemplates
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.config.namespacePrefix }}argo-events-sensor-clusterworkflowtemplates
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: sensor-submit-workflow
    namespace: {{ .Values.config.namespacePrefix }}argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.config.namespacePrefix }}argo-events-sensor-clusterworkflowtemplates
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-sensor-workflows
  namespace: {{ .Values.config.namespacePrefix }}workflows
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtemplates
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-sensor-workflows
  namespace: {{ .Values.config.namespacePrefix }}workflows
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: sensor-submit-workflow
    namespace: {{ .Values.config.namespacePrefix }}argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-events-sensor-workflows
# EventBus + EventSource live in the dedicated child Application:
# gitops/templates/argo-events-resources.yaml.
