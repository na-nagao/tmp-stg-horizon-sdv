apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argo-workflows-route
  namespace: {{ .Values.config.namespacePrefix }}argo-workflows
  labels:
    gateway: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  parentRefs:
    - kind: Gateway
      name: gke-gateway
      namespace: {{ .Values.config.namespacePrefix }}gke-gateway
      sectionName: https
  hostnames:
    - {{ .Values.config.domain }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /workflows
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: {{ .Values.config.domain }}
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.config.namespacePrefix }}argo-workflows-server
          port: 2746
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: argo-workflows-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        port: 2746
        requestPath: /
  targetRef:
    group: ""
    kind: Service
    name: {{ .Values.config.namespacePrefix }}argo-workflows-server
---
# Argo Server UI holds long-lived GET streams (api/v1/workflow-events/...) — Kubernetes watch over HTTP/2.
# Without an extended backend timeout, GKE Gateway / external HTTPS LB defaults (~30s or idle rules) can cut
# those connections; the SPA reconnects (resourceVersion in URL) and shows "Failed to connect" briefly.
# Match gateway-mtk-connect websocket backends (86400s) so multi-hour AAOS runs can keep the live list/watch.
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: argo-workflows-server-backendpolicy
  namespace: {{ .Values.config.namespacePrefix }}argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  default:
    timeoutSec: 86400
  targetRef:
    group: ""
    kind: Service
    name: {{ .Values.config.namespacePrefix }}argo-workflows-server
