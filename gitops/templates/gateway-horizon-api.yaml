apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: horizon-api-route
  namespace: {{ .Values.config.namespacePrefix }}horizon-api
  labels:
    gateway: gke-gateway
  annotations:
    # After horizon-api Application (wave 7); backend Service is created by that child app.
    # Matches gateway-argo-workflows.yaml (app wave 6, gateway wave 8).
    argocd.argoproj.io/sync-wave: "8"
spec:
  parentRefs:
    - kind: Gateway
      name: gke-gateway
      namespace: {{ .Values.config.namespacePrefix }}gke-gateway
      sectionName: https
  hostnames:
    #- {{ .Values.config.domain }}
    - cdc.horizon-sdv-stg
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /horizon-api/
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: {{ .Values.config.domain }}
            hostname: cdc.horizon-sdv-stg
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: horizon-api
          port: 80
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: horizon-api-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}horizon-api
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        # NEG probes pod targetPort (8082), not Service port 80; port 80 yields no listener on the pod.
        port: 8082
        requestPath: /healthz
  targetRef:
    group: ""
    kind: Service
    name: horizon-api
---
# Submit waits on Argo Events webhook (HTTP); default LB timeout (~15s) returns 504 before the app responds.
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: horizon-api-backendpolicy
  namespace: {{ .Values.config.namespacePrefix }}horizon-api
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  default:
    timeoutSec: 3600
  targetRef:
    group: ""
    kind: Service
    name: horizon-api
---
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-horizon-api-ingress-from-gateway
  namespace: {{ .Values.config.namespacePrefix }}horizon-api
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: horizon-api
  policyTypes:
    - Ingress
  ingress:
    # Service port 80 maps to container port http (8082); Gateway/NEG targets pod:8082.
    - ports:
        - protocol: TCP
          port: 8082
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-horizon-api-egress
  namespace: {{ .Values.config.namespacePrefix }}horizon-api
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: horizon-api
  policyTypes:
    - Egress
  egress:
    # Argo Events EventSource webhook
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}argo-events
      ports:
        - protocol: TCP
          port: 12000
    # Argo Workflows server (NDJSON log proxy)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}argo-workflows
      ports:
        - protocol: TCP
          port: 2746
    # DNS (cluster DNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # GKE Workload Identity + ADC: GKE metadata server (see cloud.google.com/kubernetes-engine/docs/how-to/network-policy).
    # - GKE 1.21+ (default datapath): 169.254.169.252:988
    # - Dataplane V2: 169.254.169.254:80
    - to:
        - ipBlock:
            cidr: 169.254.169.252/32
      ports:
        - protocol: TCP
          port: 988
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
    # Kubernetes API + Keycloak OIDC / JWKS over HTTPS
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
{{- end }}
