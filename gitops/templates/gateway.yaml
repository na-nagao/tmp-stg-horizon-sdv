kind: Gateway
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: gke-gateway
  namespace: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    networking.gke.io/certmap: horizon-sdv-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      kinds:
      - kind: HTTPRoute
      namespaces:
        from: Selector
        selector:
          matchLabels:
            otherInfra: httpToHttps
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      kinds:
      - kind: HTTPRoute
      namespaces:
        from: All
---
apiVersion: networking.gke.io/v1
kind: GCPGatewayPolicy
metadata:
  name: gke-ssl-policy
  namespace: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  default:
    sslPolicy: gke-ssl-policy
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gke-gateway


# add by n.nagao

############################################################
# Internal Gateway (VPC-internal only)
############################################################
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: sdv-internal-gateway
  namespace: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Internal L7 Load Balancer
  gatewayClassName: gke-l7-rilb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
        namespaces:
          from: All


    # --- HTTPS ---
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: internal-gateway-cert
            namespace: gke-gateway
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
        namespaces:
          from: All
