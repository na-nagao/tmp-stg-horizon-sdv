# Dedicated platform Application for EventBus and EventSource resources.
# Keep this wave after argo-events (wave 4) so CRDs exist before these CRs apply.
# During platform teardown, delete this Application before argo-events when possible so
# the controller is still present while EventBus/EventSource finalizers are reconciled.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}argo-events-resources
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
    path: gitops/apps/argo-events-resources
    helm:
      values: |
        config:
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}argo-events
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}