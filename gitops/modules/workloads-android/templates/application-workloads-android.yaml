# Child Application: multi-source workloads-android (dynpvc + aaos-builder + runtime-image + gemini ai-review WT; Sensors live in those charts).
# Deployed only via Module Manager enable (mod-workloads-android → this Application).
# Applied when Module Manager enable creates mod-workloads-android.
{{- if and .Values.repo.url .Values.repo.revision }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}workloads-android
  namespace: {{ .Values.config.namespacePrefix }}argocd
  labels:
    app.kubernetes.io/name: workloads-android
    horizon-sdv.io/module: {{ .Values.moduleName }}
    horizon-sdv.io/app-role: child
    horizon-sdv.io/module-manager-managed: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  sources:
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: gitops/workloads/android
      helm:
        values: |
          config:
            namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/builds/aaos_builder/helm
      helm:
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            #horizonDomain: {{ .Values.config.domain | quote }}
            horizonDomain: cdc.horizon-sdv-stg
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/environment/docker_image_template/helm
      helm:
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          cloudEnvConfigMapName: "horizon-workflow-cloud-env"
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/common/agentic-ai/gemini/helm
      helm:
        releaseName: workloads-android-ai-review-wt
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}workflows
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
{{- end }}

