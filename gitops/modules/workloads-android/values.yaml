# Injected by Module Manager on enable.
moduleName: ""

moduleManagerNamespace: module-manager

argocd:
  namespace: argocd
  project: horizon-sdv

repo:
  url: ""
  revision: HEAD

# From MODULE_CONFIG (root module-manager Helm values): projectID, region, zone, namespacePrefix,
# domain, workloads.android.url/branch, and pipeline auth via config.scm.authMethod (Module Manager → config.scm).
# AAOS webhook Sensors (webhook-aaos-builder*) deploy from the aaos_builder and docker_image_template
# Helm sources on workloads-android into namespacePrefix+argo-events (templates/workflow/sensors.yaml).
# webhooks.enabled is retained for MODULE_CONFIG compatibility (previously gated a duplicate Argo Application).
config:
  workloads:
    android:
      webhooks:
        enabled: true

overviewServiceName: mod-workloads-android-overview

softFeaturesEnabled: {}
