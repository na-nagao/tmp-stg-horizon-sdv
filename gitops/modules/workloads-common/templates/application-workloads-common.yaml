# Child Application: shared ClusterWorkflowTemplates (common-docker-image-build + prepare-github-app-git-creds); Sensors in those charts.
# Deployed via Module Manager enable (mod-workloads-common). Sync wave 2 before workloads-android (wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}workloads-common
  namespace: {{ .Values.config.namespacePrefix }}argocd
  labels:
    app.kubernetes.io/name: workloads-common
    horizon-sdv.io/module: {{ .Values.moduleName }}
    horizon-sdv.io/app-role: child
    horizon-sdv.io/module-manager-managed: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  sources:
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/common/common_docker_image/helm
      helm:
        releaseName: workloads-common-docker-image-cwt
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: gitops/modules/workloads-common/prepare-github-app-git-creds
      helm:
        releaseName: workloads-common-prepare-github-app-cwt
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}workflows
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
