{{- if eq .Values.scm.authMethod "app" }}
# ConfigMap for ClusterWorkflowTemplate prepare-github-app-git-creds (script mounted at /scripts).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.namespacePrefix }}workflow-github-app-token-script
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  github_app_installation_token.py: |
{{ .Files.Get "files/github_app_installation_token.py" | nindent 4 }}
{{- end }}
