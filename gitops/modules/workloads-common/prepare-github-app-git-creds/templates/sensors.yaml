# Argo Events Sensor for ClusterWorkflowTemplate prepare-github-app-git-creds (same EventSource `webhook` / `workflow-dispatch`).
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: webhook-prepare-github-app-git-creds
  namespace: {{ .Values.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  eventBusName: default
  template:
    serviceAccountName: sensor-submit-workflow
  dependencies:
    - name: webhook-dep
      eventSourceName: webhook
      eventName: workflow-dispatch
      filters:
        data:
          - path: body.workflowTemplateName
            type: string
            value:
              - "prepare-github-app-git-creds"
  triggers:
    - template:
        name: submit-prepare-github-app-git-creds
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: webhook-prepare-gh-app-
                namespace: {{ .Values.namespacePrefix }}workflows
              spec:
                entrypoint: prepare-github-app-git-creds
                workflowTemplateRef:
                  name: prepare-github-app-git-creds
                  clusterScope: true
                arguments:
                  parameters:
                    - name: horizonSubmittedFrom
          parameters:
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedBy
              dest: metadata.annotations.horizon-sdv\.io/submitted-by
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: metadata.labels.horizon-sdv\.io/submitted-from
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: spec.arguments.parameters.0.value
