#
# ConfigConnectorContext is required in every namespace that manages KCC resources
# (namespaced-mode Config Connector). Created here so each module namespace is
# self-sufficient without the platform chart needing to enumerate module namespaces.
# gcpProjectId is required for this module and is always expected to be set.
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnectorContext
metadata:
  name: configconnectorcontext.core.cnrm.cloud.google.com
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  googleServiceAccount: gke-config-connector-sa@{{ .Values.gcpProjectId }}.iam.gserviceaccount.com
