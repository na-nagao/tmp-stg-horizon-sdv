# Child Application that deploys sample-module argo-workflows (templates/workflowtemplates.yaml + templates/sensors.yaml; catalog-exposed).
# Lives in its own Application so ArgoCD only validates WorkflowTemplate resources
# after the Argo Workflows CRDs are already installed on the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mod-{{ .Values.moduleName }}-argo-workflows
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.moduleName }}
    horizon-sdv.io/module: {{ .Values.moduleName }}
    horizon-sdv.io/app-role: child
    horizon-sdv.io/module-manager-managed: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.repo.url | quote }}
    targetRevision: {{ .Values.repo.revision | quote }}
    path: gitops/modules/sample-module/argo-workflows
    helm:
      values: |
        workflowNamespace: {{ .Values.config.namespacePrefix }}workflows
        eventsNamespace: {{ .Values.config.namespacePrefix }}argo-events
        # Derived from Module Manager soft dependency state for sample-soft.
        referenceSampleSoftWorkflowTemplate: {{ index .Values.softFeaturesEnabled "sample-soft" | default false }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}workflows
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
