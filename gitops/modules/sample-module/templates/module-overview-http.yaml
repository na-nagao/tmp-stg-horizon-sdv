#
# In-cluster static overview HTML for the Developer Portal (Module Manager GET /modules/{name}/overview).
# Synced with the parent module Application; not a separate Argo Application.
# overviewServiceName and overviewNamespace are chart values (Module Manager merges overviewNamespace for workload modules).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.overviewServiceName }}-html
  namespace: {{ .Values.overviewNamespace }}
  labels:
    app.kubernetes.io/name: module-overview
    app.kubernetes.io/component: module-overview-http
    horizon-sdv.io/module: {{ .Values.moduleName | quote }}
data:
  index.html: |-
{{ .Files.Get "portal/overview.html" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.overviewServiceName }}
  namespace: {{ .Values.overviewNamespace }}
  labels:
    app.kubernetes.io/name: module-overview
    horizon-sdv.io/module: {{ .Values.moduleName | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: module-overview
      horizon-sdv.io/module: {{ .Values.moduleName | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: module-overview
        horizon-sdv.io/module: {{ .Values.moduleName | quote }}
    spec:
      containers:
        - name: nginx
          image: nginx:1.23
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
      volumes:
        - name: html
          configMap:
            name: {{ .Values.overviewServiceName }}-html
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.overviewServiceName }}
  namespace: {{ .Values.overviewNamespace }}
  labels:
    app.kubernetes.io/name: module-overview
    horizon-sdv.io/module: {{ .Values.moduleName | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: module-overview
    horizon-sdv.io/module: {{ .Values.moduleName | quote }}
  ports:
    - name: http
      port: 80
      targetPort: http
