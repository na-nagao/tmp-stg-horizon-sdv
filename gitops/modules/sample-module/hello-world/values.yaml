# Namespace for hello-world and PubSub (should have KCC configured if gcpProjectId is set).
namespace: sample-module-hello

# GCP project ID for PubSubTopic (KCC). Leave empty to skip PubSub.
gcpProjectId: ""

# When empty, soft flags come from parent Helm values (pod rollout on toggle). When set by the parent Application, flags come from a Module Manager–managed ConfigMap (see ModuleCatalog softFeaturesPropagation).
parentModuleName: ""

# Legacy: used only when parentModuleName is empty (Helm-injected env SOFT_FEATURE_ENABLED_*).
softFeaturesEnabled: {}

# Public URL path prefix (leading slash, no trailing slash). Parent sample-module passes helloWorld.rootPath. Must match Module Catalog application URL for this app.
rootPath: /hello-world

# Injected by parent sample-module Application (domain, namespacePrefix, enableNetworkPolicies, projectID, …).
config: {}
