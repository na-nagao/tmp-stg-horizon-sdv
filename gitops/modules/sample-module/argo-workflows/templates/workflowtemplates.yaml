# WorkflowTemplates for module sample (Horizon catalog: exposed). Argo Events: templates/sensors.yaml.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sample-smoke-test
  namespace: {{ .Values.workflowNamespace }}
  labels:
    app.kubernetes.io/name: smoke-test
    horizon-sdv.io/expose: "true"
    horizon-sdv.io/module: sample
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  entrypoint: run-smoke-test
  serviceAccountName: workflow-executor
  arguments:
    parameters:
      - name: horizonSubmittedFrom
        value: ""
      - name: sampleEnv
        value: ""
      - name: sampleBuildId
        value: ""
      - name: sampleNote
        value: ""
  templates:
    - name: run-smoke-test
      dag:
        tasks:
          - name: log-parameters
            template: log-parameters
{{- if .Values.referenceSampleSoftWorkflowTemplate }}
          - name: sample-soft-stage
            template: sample-soft-stage
            depends: log-parameters
            # Soft stage is deploy-time controlled by referenceSampleSoftWorkflowTemplate.
{{- end }}
          - name: echo-and-artifact
            template: echo-and-artifact
{{- if .Values.referenceSampleSoftWorkflowTemplate }}
            depends: "log-parameters && sample-soft-stage"
{{- else }}
            depends: log-parameters
{{- end }}
          - name: verify-gcs
            template: verify-gcs
            # Same DAG must use only `depends` (not `dependencies`) once any task uses `depends` (Argo validation).
            depends: echo-and-artifact
    - name: log-parameters
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "WorkflowTemplate: smoke-test"
            echo "sampleEnv={{ "{{workflow.parameters.sampleEnv}}" }}"
            echo "sampleBuildId={{ "{{workflow.parameters.sampleBuildId}}" }}"
            echo "sampleNote={{ "{{workflow.parameters.sampleNote}}" }}"
            echo "at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
{{- if .Values.referenceSampleSoftWorkflowTemplate }}
    - name: sample-soft-stage
      steps:
        - - name: invoke-sample-soft-smoke-test
            templateRef:
              name: sample-soft-smoke-test
              template: run-smoke-test
            arguments:
              parameters:
                - name: horizonSubmittedFrom
                  value: "{{ "{{workflow.parameters.horizonSubmittedFrom}}" }}"
                - name: sampleEnv
                  value: "{{ "{{workflow.parameters.sampleEnv}}" }}"
                - name: sampleBuildId
                  value: "{{ "{{workflow.parameters.sampleBuildId}}" }}"
                - name: sampleNote
                  value: "{{ "{{workflow.parameters.sampleNote}}" }}"
{{- end }}
    - name: echo-and-artifact
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "Smoke test running at $(date)"
            echo "SA: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)/$(cat /var/run/secrets/kubernetes.io/serviceaccount/..data/namespace 2>/dev/null || echo 'n/a')"
            echo "Smoke test passed - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/result.txt
            cat /tmp/result.txt
      outputs:
        artifacts:
          - name: smoke-result
            path: /tmp/result.txt
    - name: verify-gcs
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "Artifact upload verified by reaching this step."
            echo "All checks passed."
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sample-smoke-test-alt
  namespace: {{ .Values.workflowNamespace }}
  labels:
    app.kubernetes.io/name: smoke-test
    horizon-sdv.io/expose: "true"
    horizon-sdv.io/module: sample
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  entrypoint: run-smoke-test
  serviceAccountName: workflow-executor
  arguments:
    parameters:
      - name: horizonSubmittedFrom
        value: ""
      - name: releaseChannel
        value: ""
      - name: ticketId
        value: ""
      - name: owner
        value: ""
  templates:
    - name: run-smoke-test
      dag:
        tasks:
          - name: log-parameters
            template: log-parameters
          - name: echo-and-artifact
            template: echo-and-artifact
            dependencies: [log-parameters]
          - name: verify-gcs
            template: verify-gcs
            dependencies: [echo-and-artifact]
    - name: log-parameters
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "WorkflowTemplate: smoke-test-alt (variant)"
            echo "releaseChannel={{ "{{workflow.parameters.releaseChannel}}" }}"
            echo "ticketId={{ "{{workflow.parameters.ticketId}}" }}"
            echo "owner={{ "{{workflow.parameters.owner}}" }}"
            echo "at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - name: echo-and-artifact
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "Smoke test running at $(date)"
            echo "SA: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)/$(cat /var/run/secrets/kubernetes.io/serviceaccount/..data/namespace 2>/dev/null || echo 'n/a')"
            echo "Smoke test passed - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/result.txt
            cat /tmp/result.txt
      outputs:
        artifacts:
          - name: smoke-result
            path: /tmp/result.txt
    - name: verify-gcs
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "Artifact upload verified by reaching this step."
            echo "All checks passed."
