# Module name (injected by Module Manager when enabling). Used to derive child Application names.
moduleName: ""

# Namespace where Module Manager runs (ModuleCatalog is created here so the controller sees it).
moduleManagerNamespace: module-manager

# ArgoCD namespace and project for the child app-of-apps Application (passed by Module Manager when enabling).
argocd:
  namespace: argocd
  project: horizon-sdv

# Repo URL and revision for the child Application (passed by Module Manager when enabling the module).
repo:
  url: ""
  revision: HEAD

# Namespace for the hello-world child app and PubSub (KCC). Created by ArgoCD when the child Application syncs.
helloWorldNamespace: sample-module-hello
overviewServiceName: mod-sample-overview
overviewNamespace: sample-module-hello

# Public Gateway path for hello-world (leading slash, no trailing slash). Keep in sync with module-manager catalog applications[].url.
helloWorld:
  rootPath: /hello-world

# Environment config injected by Module Manager (projectID, region, zone, namespacePrefix, etc.).
# Smoke WorkflowTemplates deploy via child app gitops/modules/sample-module/argo-workflows (namespaces from config.namespacePrefix).
config: {}

# Per soft-dependency module name -> enabled (Module Manager patches from catalog softDependencies + state).
softFeaturesEnabled: {}
