apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: horizon-api-module-manager
  namespace: {{ .Values.moduleManagerNamespace }}
  labels:
    app.kubernetes.io/name: horizon-api
rules:
  - apiGroups: ["horizon-sdv.io"]
    resources:
      - modulemanagerstates
      - modulecatalogs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: horizon-api-module-manager
  namespace: {{ .Values.moduleManagerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: horizon-api-module-manager
subjects:
  - kind: ServiceAccount
    name: horizon-api
    namespace: {{ .Values.namespace }}
---
{{- $workflowsNs := .Values.workflowsNamespace | default "workflows" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: horizon-api-workflows
  namespace: {{ $workflowsNs }}
  labels:
    app.kubernetes.io/name: horizon-api
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: horizon-api-workflows
  namespace: {{ $workflowsNs }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: horizon-api-workflows
subjects:
  - kind: ServiceAccount
    name: horizon-api
    namespace: {{ .Values.namespace }}
