apiVersion: apps/v1
kind: Deployment
metadata:
  name: horizon-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: horizon-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: horizon-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: horizon-api
    spec:
      serviceAccountName: horizon-api
      containers:
        - name: horizon-api
          image: {{ .Values.image | quote }}
          imagePullPolicy: Always
          args:
            - "--namespace={{ .Values.namespace }}"
            - "--module-manager-namespace={{ .Values.moduleManagerNamespace }}"
            - "--module-manager-state-name={{ .Values.moduleManagerStateName }}"
            - "--module-manager-catalog-name={{ .Values.moduleManagerCatalogName }}"
            {{- $wfNs := .Values.workflowsNamespace | default "workflows" }}
            - "--workflows-namespace={{ $wfNs }}"
            - "--oidc-issuer-url={{ .Values.oidcIssuerUrl }}"
            {{- if .Values.oidcClientId }}
            - "--oidc-client-id={{ .Values.oidcClientId }}"
            {{- end }}
            - "--oidc-skip-client-id-check={{ .Values.oidcSkipClientIdCheck }}"
            - "--events-webhook-url={{ .Values.eventsWebhookUrl }}"
            # API lives at /api/v1/... ; /workflows/ is only the UI baseHref (requests under /workflows/api/... return HTML SPA).
            # Default namespace when parent Application omits argoWorkflowsNamespace (empty → broken host ..svc).
            {{- $argoNs := .Values.argoWorkflowsNamespace | default "argo-workflows" }}
            - "--argo-base-url=http://argo-workflows-server.{{ $argoNs }}.svc.cluster.local:2746"
            {{- if .Values.gcsArtifactBucket }}
            - "--gcs-artifact-bucket={{ .Values.gcsArtifactBucket }}"
            {{- end }}
            {{- if .Values.gcsSigningServiceAccount }}
            - "--gcs-signing-service-account={{ .Values.gcsSigningServiceAccount }}"
            {{- end }}
            - "--workflow-ttl-seconds-after-success={{ .Values.workflowTtlSecondsAfterSuccess }}"
            - "--workflow-ttl-seconds-after-failure={{ .Values.workflowTtlSecondsAfterFailure }}"
            - "--workflow-ttl-seconds-after-completion={{ .Values.workflowTtlSecondsAfterCompletion }}"
            {{- if .Values.workflowDeleteWaitTimeout }}
            - "--workflow-delete-wait-timeout={{ .Values.workflowDeleteWaitTimeout }}"
            {{- end }}
            - "--http-bind-address=:8082"
            - "--metrics-bind-address=:8080"
            - "--health-probe-bind-address=:8081"
          {{- if .Values.gceMetadataHost }}
          env:
            - name: GCE_METADATA_HOST
              value: {{ .Values.gceMetadataHost | quote }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: http
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
