apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-namespace-drain
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: workflow-namespace-drain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workflow-namespace-drain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workflow-namespace-drain
    spec:
      serviceAccountName: workflow-namespace-drain
      containers:
        - name: workflow-namespace-drain
          image: {{ .Values.image }}
          imagePullPolicy: Always
          args:
            - "--argocd-namespace={{ .Values.argocd.namespace }}"
            - "--gitops-root-app-name={{ .Values.gitopsRootAppName }}"
            - "--root-finalizer={{ .Values.rootFinalizer }}"
            - "--workflows-namespace={{ .Values.workflowsNamespace }}"
            - "--graceful-timeout={{ .Values.gracefulTimeout }}"
            - "--workflow-list-page-size={{ .Values.workflowListPageSize }}"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
