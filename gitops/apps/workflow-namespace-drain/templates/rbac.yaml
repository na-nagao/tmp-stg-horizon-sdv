# The controller namespace is created by Terraform Helm provider's
# create_namespace=true. Do not render a Namespace object here: Helm creates the
# release namespace before rendering chart resources, and also templating that
# same Namespace can cause Helm ownership/adoption conflicts on fresh installs.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-namespace-drain
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: workflow-namespace-drain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-workflows
  labels:
    app.kubernetes.io/name: workflow-namespace-drain
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflows/finalizers"]
    verbs: ["get", "list", "watch", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-workflows
  labels:
    app.kubernetes.io/name: workflow-namespace-drain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-workflows
subjects:
  - kind: ServiceAccount
    name: workflow-namespace-drain
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-namespace-drain-applications
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: workflow-namespace-drain
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applications/finalizers"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-namespace-drain-applications
  namespace: {{ .Values.argocd.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflow-namespace-drain-applications
subjects:
  - kind: ServiceAccount
    name: workflow-namespace-drain
    namespace: {{ .Values.namespace }}
