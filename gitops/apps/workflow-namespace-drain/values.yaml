# Namespace where this Terraform-managed controller runs.
namespace: workflow-namespace-drain

# Controller image (full AR URL with tag, set by Terraform).
image: ""

# ArgoCD namespace containing the root horizon-sdv Application.
argocd:
  namespace: argocd

# Namespace containing Argo Workflow CRs.
workflowsNamespace: workflows

# Root Argo CD app-of-apps Application name; must match Terraform (prefix + horizon-sdv).
gitopsRootAppName: horizon-sdv

# Finalizer owned by this controller on the root Application.
rootFinalizer: horizon-sdv.io/workflow-namespace-drain

# How long to wait before force-clearing finalizers on deleting Workflow CRs.
gracefulTimeout: 60s

# Page size used when listing Workflow CRs during teardown.
workflowListPageSize: 200
