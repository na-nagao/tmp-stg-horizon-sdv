apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.config.namespacePrefix }}horizon-dev-portal
  namespace: {{ .Values.config.namespacePrefix }}horizon-dev-portal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: horizon-dev-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: horizon-dev-portal
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: horizon-dev-portal
          image: {{ .Values.config.gitops.horizonDevPortal }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.config.namespacePrefix }}horizon-dev-portal-config
          env:
            - name: HORIZON_API_CI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.namespacePrefix }}horizon-dev-portal-secrets
                  key: HORIZON_API_CI_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
