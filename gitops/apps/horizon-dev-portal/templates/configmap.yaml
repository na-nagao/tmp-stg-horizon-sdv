apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.namespacePrefix }}horizon-dev-portal-config
  namespace: {{ .Values.config.namespacePrefix }}horizon-dev-portal
data:
  LISTEN_ADDR: ":8080"
  OIDC_ISSUER_URL: {{ .Values.config.oidcIssuerUrl | quote }}
  KEYCLOAK_TOKEN_URL: {{ .Values.config.keycloakTokenUrl | quote }}
  MODULE_MANAGER_BASE_URL: {{ .Values.config.moduleManagerBaseUrl | quote }}
  HORIZON_API_BASE_URL: {{ .Values.config.horizonApiBaseUrl | quote }}
  PUBLIC_BASE_URL: {{ .Values.config.publicBaseUrl | quote }}
  # HTTP path prefix where the SPA is mounted (no trailing slash); must match Gateway and Keycloak redirect URIs.
  PUBLIC_PATH: {{ .Values.config.publicPath | quote }}
  KEYCLOAK_TOKEN_PATH: {{ .Values.config.keycloakTokenPath | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.config.keycloakClientId | quote }}
  HORIZON_API_CI_CLIENT_ID: {{ .Values.config.horizonApiCiClientId | quote }}
