spec:
  destination:
    server: https://kubernetes.default.svc

global:
  nameOverride: ""
  fullnameOverride: ""

replicaCount: 1

podAnnotations: {}

image:
  repository: horizon-dev-portal
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

secret:
  horizonApiCiClientSecret: ""

config:
  namespacePrefix: ""
  gitops:
    horizonDevPortal: ""

  domain: ""
  # Browser URL path prefix for the SPA (leading slash, no trailing slash), e.g. /developer-portal or /portal.
  publicPath: "/developer-portal"
  # Full browser origin for window.APP_CONFIG.baseUrl (scheme + host, optional port). Do not set this to the Argo Workflows UI path (/workflows); the portal appends /workflows/... for deep links itself.
  publicBaseUrl: ""

  # Keycloak / OIDC (browser uses relative keycloakTokenPath; Go proxy uses full issuer + token URLs).
  keycloakRealm: "horizon"
  keycloakHttpPathPrefix: "/auth"
  oidcIssuerUrl: ""
  keycloakTokenUrl: ""
  # Relative path for window.APP_CONFIG.keycloakUrl (same host as the portal).
  keycloakTokenPath: "/auth/realms/horizon/protocol/openid-connect/token"
  keycloakClientId: "horizon-dev-portal"
  # Confidential client id for Horizon API access from the Go proxy (must match Keycloak + Secret).
  horizonApiCiClientId: "horizon-api-ci"

  # In-cluster HTTP base URLs (override if your Service names differ).
  moduleManagerBaseUrl: "http://module-manager.module-manager.svc.cluster.local:8082"
  horizonApiBaseUrl: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
