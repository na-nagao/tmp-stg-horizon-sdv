# Namespace where Module Manager runs (ModuleManagerState and ModuleCatalog CRs).
namespace: module-manager

# ArgoCD namespace and project for module Applications.
argocd:
  namespace: argocd
  project: horizon-sdv

# Git repo URL and revision for module charts (used when creating ArgoCD Applications).
repo:
  url: ""   # set via parent or --set repo.url
  revision: HEAD

# Controller image (full AR URL with tag, set by parent via Terraform).
image: ""

# Environment config injected by the parent chart (Terraform -> root GitOps -> here).
# Module Manager passes this block into every ArgoCD Application it creates.
config:
  namespacePrefix: ""

# Root Argo CD app-of-apps Application name(s), comma-separated; must match Terraform (prefix + horizon-sdv).
gitopsRootAppName: horizon-sdv

# Singleton CR names (state and catalog in module-manager namespace).
stateCRName: cluster
catalogCRName: cluster
