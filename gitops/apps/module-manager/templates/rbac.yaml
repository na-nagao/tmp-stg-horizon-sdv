# Module Manager: Role in its namespace (ModuleManagerState, ModuleCatalog) and Role in argocd (Applications).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: module-manager
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: module-manager
rules:
  - apiGroups: ["horizon-sdv.io"]
    resources:
      - modulemanagerstates
      - modulemanagerstates/status
      - modulecatalogs
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: module-manager
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: module-manager
subjects:
  - kind: ServiceAccount
    name: module-manager
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: module-manager-applications
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: module-manager
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applications/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: module-manager-applications
  namespace: {{ .Values.argocd.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: module-manager-applications
subjects:
  - kind: ServiceAccount
    name: module-manager
    namespace: {{ .Values.namespace }}
---
# KCC finalizer stripper: Module Manager needs to list and patch KCC-managed resources in module
# destination namespaces during platform drain so that cnrm.cloud.google.com/finalizers on
# objects stuck in DeleteFailed do not block namespace termination.
# The apiGroup wildcard covers all *.cnrm.cloud.google.com groups (pubsub, iam, storage, etc.)
# without enumerating them, since RBAC does not support suffix wildcards.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: module-manager-kcc-drain
  labels:
    app.kubernetes.io/name: module-manager
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: module-manager-kcc-drain
  labels:
    app.kubernetes.io/name: module-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: module-manager-kcc-drain
subjects:
  - kind: ServiceAccount
    name: module-manager
    namespace: {{ .Values.namespace }}
---
# Soft-features ConfigMap mode: Module Manager upserts ConfigMaps in workload namespaces (see ModuleCatalog softFeaturesPropagation).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: module-manager-soft-features
  labels:
    app.kubernetes.io/name: module-manager
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: module-manager-soft-features
  labels:
    app.kubernetes.io/name: module-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: module-manager-soft-features
subjects:
  - kind: ServiceAccount
    name: module-manager
    namespace: {{ .Values.namespace }}
