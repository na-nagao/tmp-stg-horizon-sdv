apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-manager
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: module-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: module-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: module-manager
    spec:
      serviceAccountName: module-manager
      containers:
        - name: module-manager
          image: {{ .Values.image }}
          imagePullPolicy: Always
          args:
            - "--namespace={{ .Values.namespace }}"
            - "--argocd-namespace={{ .Values.argocd.namespace }}"
            - "--argocd-project={{ .Values.argocd.project }}"
            - "--state-cr-name={{ .Values.stateCRName }}"
            - "--catalog-cr-name={{ .Values.catalogCRName }}"
            - "--target-revision={{ .Values.repo.revision }}"
            - "--gitops-root-app-name={{ .Values.gitopsRootAppName }}"
          env:
            - name: REPO_URL
              value: "{{ .Values.repo.url }}"
            - name: MODULE_CONFIG
              value: {{ .Values.config | toYaml | quote }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: api
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
