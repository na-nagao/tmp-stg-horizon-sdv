apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modulemanagerstates.horizon-sdv.io
  annotations:
    helm.sh/hook: crd-install
    helm.sh/hook-weight: "-5"
spec:
  group: horizon-sdv.io
  names:
    kind: ModuleManagerState
    listKind: ModuleManagerStateList
    plural: modulemanagerstates
    singular: modulemanagerstate
    shortNames:
      - mmstate
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Reserved for future use (e.g. desired state).
            status:
              type: object
              properties:
                enabledModules:
                  type: array
                  items:
                    type: string
                  description: List of module IDs that are currently enabled.
                moduleIds:
                  type: object
                  additionalProperties:
                    type: string
                  description: Map of module name to assigned stable ID.
                moduleTargetRevisions:
                  type: object
                  additionalProperties:
                    type: string
                  description: Map of module name to Git ref (branch, tag, SHA) for the module Argo CD Application.
                workflowsVisibility:
                  type: object
                  description: Developer Portal workflow list visibility (optional).
                  properties:
                    allowedSubmittedFrom:
                      type: array
                      description: Allowed horizon-sdv.io/submitted-from label values; empty array hides all.
                      items:
                        type: string
      subresources:
        status: {}
