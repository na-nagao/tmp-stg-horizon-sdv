        groovy:
          - script: >
              println("This is groovy !");
        jobs:
          - script: >
              pipelineJob('Seed Workloads') {
                description('''<br/><h3 style="margin-bottom: 10px;">Seed Workloads Job</h3>
                  <p>This seed job is used to to create and update the workload pipeline folders and jobs in Jenkins.</p>
                  <h4 style="margin-bottom: 10px;">Mandatory Parameters</h4>
                  <ul><li><code>SEED_WORKLOAD</code>: The name of the workload to populate.</li></ul>
                  <p>Refer to the README.md in the repository for further information.</p>
                ''')

                triggers {
                  hudsonStartupTrigger {
                    nodeParameterName("")
                    label("")
                    quietPeriod("0")
                    runOnChoice("ON_CONNECT")
                  }
                }

                properties {
                  authorizeProjectProperty {
                    strategy {
                      triggeringUsersAuthorizationStrategy()
                    }
                  }
                }

                definition {
                  cpsScm {
                    lightweight()
                    scm {
                      git {
                        remote {
                          url('{{ .Values.scm.repoUrl }}')
                          {{- if ne .Values.scm.authMethod "none" }}
                          credentials('jenkins-scm-creds')
                          {{- end }}
                        }
                        branch('*/{{ .Values.scm.branch }}')
                      }
                    }
                    scriptPath('workloads/seed/Jenkinsfile')
                  }
                }
              }
        unclassified:
          ansiColorBuildWrapper:
            globalColorMapName: "xterm"
          buildUserVars:
            allBuilds: true
          gerrit-trigger:
            servers:
              - name: "Gerrit"
                noConnectionOnStartup: false
                config:
                  buildCurrentPatchesOnly:
                    abortAbandonedPatchsets: false
                    abortManualPatchsets: false
                    abortNewPatchsets: false
                    abortSameTopic: false
                    enabled: false
                  categories:
                    - verdictDescription: "Code Review"
                      verdictValue: "Code-Review"
                    - verdictDescription: "Verified"
                      verdictValue: "Verified"
                    - verdictDescription: "Ready for Build"
                      verdictValue: "Ready-for-Build"
                  gerritAuthKeyFile: "/run/secrets/additional/jenkins-gerrit-ssh-private-key-privateKey"
                  gerritFrontEndUrl: "https://cdc.horizon-sdv-stg/gerrit/"
                  #gerritFrontEndUrl: "https://{{ .Values.config.domain }}/gerrit/"
                  gerritHostName: "gerrit-service.{{ .Values.config.namespacePrefix }}gerrit.svc.cluster.local"
                  gerritSshPort: 29418
                  gerritUserName: "gerrit-admin"
                  useRestApi: false
          timestamper:
            allPipelines: true
            systemTimeFormat: "'<b>'yyyy-MM-dd HH:mm:ss.SSS'</b> '"
            elapsedTimeFormat: "'<b>'HH:mm:ss.S'</b> '"
          globalLibraries:
            libraries:
            - defaultVersion: "{{ .Values.scm.branch }}"
              name: "cvd-pipeline-shared-library"
              retriever:
                modernSCM:
                  libraryPath: "workloads/common/jenkins/shared-libraries/cvd-pipeline-shared-library"
                  scm:
                    {{- if eq .Values.scm.type "github" }}
                    github:
                      configuredByUrl: true
                      {{- if ne .Values.scm.authMethod "none" }}
                      credentialsId: "jenkins-scm-creds"
                      {{- end }}
                      repositoryUrl: "{{ .Values.scm.repoUrl }}"
                      repoOwner: "{{ .Values.scm.repoOwner }}"
                      repository: "{{ .Values.scm.repoName }}"
                      traits:
                      - gitHubBranchDiscovery:
                          strategyId: 3
                      - gitHubPullRequestDiscovery:
                          strategyId: 2
                      - gitHubForkDiscovery:
                          strategyId: 2
                          trust: "gitHubTrustPermissions"
                    {{- else }}
                    git:
                      {{- if ne .Values.scm.authMethod "none" }}
                      credentialsId: "jenkins-scm-creds"
                      {{- end }}
                      remote: "{{ .Values.scm.repoUrl }}"
                      traits:
                      - gitBranchDiscovery
                    {{- end }}
