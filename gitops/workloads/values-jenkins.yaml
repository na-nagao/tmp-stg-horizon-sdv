config:
  workloads:
    android:
      cuttlefish:
        tag: "v1410"
      mirror:
        workloadEnv:
          image: "horizon-sdv/mirror-workloads/env"
        preset:
          storageClassName: "sdv-mirror-zonal-rwx"
          filestorePVCName: "sdv-mirror-filestore-pvc"
          filestorePVCMountPathInContainer: "/mnt/mirror-filestore-pvc"
          mirrorRootSubdirectoryName: "horizon-mirrors"
          network: "sdv-network"
          subnetwork: "sdv-subnet"
          # region: defined in argocd-config.yaml
          # zone: defined in argocd-config.yaml
          # projectID: defined in argocd-config.yaml
    cloudWorkstations:
      workloadEnv:
        image: "horizon-sdv/cloud-ws-workloads/env"
      clusterPresets:
        name: "sdv-cloud-ws-cluster"
        # region: defined in argocd-config.yaml
        # projectID: defined in argocd-config.yaml
        network: "sdv-network"
        subnetwork: "sdv-subnet"
        privateCluster: false
      workstationPresets:
        wsImages:
          horizonCodeOSS:
            image: "horizon-sdv/cloud-ws-images/horizon-code-oss"
          horizonASFP:
            image: "horizon-sdv/cloud-ws-images/horizon-asfp"
          horizonAndroidStudio:
            image: "horizon-sdv/cloud-ws-images/horizon-android-studio"
    common:
      serviceAccounts:
        terraformWorkloadsSA:
          name: "terraform-workloads-sa"
