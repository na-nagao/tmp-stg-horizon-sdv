  #javaOpts: "-Dcom.cloudbees.workflow.rest.external.JobExt.maxRunsPerJob=50"
  # 以下追加: javaOptsを修正してCA証明書のパスを追加  
  javaOpts: "-Dcom.cloudbees.workflow.rest.external.JobExt.maxRunsPerJob=50 -Djavax.net.ssl.trustStore=/var/jenkins_home/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
  initContainers:
    - name: import-ca-cert
      image: eclipse-temurin:17-jdk
      command:
        - sh
        - -c
        - |
          cp $JAVA_HOME/lib/security/cacerts /tmp/cacerts/cacerts
          keytool -import -noprompt -trustcacerts \
            -alias internal-ca \
            -file /tmp/ca/ca.crt \
            -keystore /tmp/cacerts/cacerts \
            -storepass changeit
      volumeMounts:
        - name: ca-cert
          mountPath: /tmp/ca
        - name: shared-cacerts
          mountPath: /tmp/cacerts
  volumes:
    - name: ca-cert
      secret:
        secretName: internal-ca-cert
    - name: shared-cacerts
      emptyDir: {}
  volumeMounts:
    - name: shared-cacerts
      mountPath: /var/jenkins_home/cacerts
      subPath: cacerts
  enableRawHtmlMarkupFormatter: true
  markupFormatter: rawHtml
  noUsageStatistics: true
  JCasC:
    enabled: true
    security:
      queueItemAuthenticator:
        authenticators:
          - project:
              disabledStrategies:
                - "org.jenkinsci.plugins.authorizeproject.strategy.SystemAuthorizationStrategy"
                - "org.jenkinsci.plugins.authorizeproject.strategy.SpecificUsersAuthorizationStrategy"
                - "org.jenkinsci.plugins.authorizeproject.strategy.AnonymousAuthorizationStrategy"
              enabledStrategies:
                - "org.jenkinsci.plugins.authorizeproject.strategy.TriggeringUsersAuthorizationStrategy"
    defaultConfig: true
    configScripts:
      welcome-message: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                - googleRobotPrivateKey:
                    description: "GCE Creds"
                    id: "gce-creds"
                    scope: GLOBAL
                    projectId: {{ .Values.config.projectID }}
                    serviceAccountConfig:
                      json:
                        filename: {{ .Values.config.projectID }}.json
                        secretJsonKey: ${base64:${jenkins-gce-creds-gce-creds-json}}
        jenkins:
          systemMessage: Welcome to Horizon SDV server.
          disabledAdministrativeMonitors:
            # Disable: plugin monitor
            - "hudson.PluginManager$PluginUpdateMonitor"
            # Disable: Jenkins Update Notification
            - "hudson.model.UpdateCenter$CoreUpdateMonitor"
            # Disable: Update Site WarningsSecurity
            - "jenkins.security.UpdateSiteWarningsMonitor"
            - "hudson.util.DoubleLaunchChecker"
            # Disable: Built-in Node With Agents Executors Configured MonitorSecurity
            - "jenkins.diagnostics.ControllerExecutorsAgents"
            # Disable: Role-Based Naming Strategy not enabled
            - "org.jenkinsci.plugins.rolestrategy.NamingStrategyAdministrativeMonitor"
            # Disable: CSP Notifications
            - "jenkins.security.csp.impl.CspRecommendation"
          authorizationStrategy:
            roleBased:
              permissionTemplates:
                - name: "administrators"
                  permissions:
                    - "Job/Read"
                    - "Job/Discover"
                    - "Job/Build"
                    - "Job/Configure"
                    - "Job/Delete"
                    - "Job/Create"
                    - "Job/Move"
                    - "Job/Workspace"
                    - "Job/Cancel"
                    - "Run/Replay"
                    - "Run/Delete"
                    - "Run/Update"
                    - "Run/Artifacts"
                    - "View/Read"
                    - "View/Configure"
                    - "View/Delete"
                    - "View/Create"
                - name: "developers"
                  permissions:
                    - "Job/Read"
                    - "Job/Discover"
                    - "Job/Build"
                    - "View/Read"
                    - "Job/Configure"
                    - "Job/Delete"
                    - "Job/Create"
                    - "Job/Move"
                    - "Job/Workspace"
                    - "Job/Cancel"
                    - "Run/Replay"
                - name: "viewers"
                  permissions:
                    - "Job/Read"
                    - "Job/Discover"
                    - "View/Read"
              roles:
                global:
                  - name: "administrators"
                    description: "Full Jenkins administration (Overall/Administer)."
                    permissions:
                      - "Overall/Administer"
                    entries:
                      - group: "administrators"
                      # Example user
                      # - user: "john.doe@example.com"
                  - name: "developers"
                    description: "Developer access: run builds on agents, create jobs; workload permissions via item role."
                    permissions:
                      - "Overall/Read"
                      - "Agent/Build"
                      - "Job/Create"
                    entries:
                      - group: "developers"
                      # Example user
                      # - user: "john.doe@example.com"
                  - name: "viewers"
                    description: "Read-only UI access; job visibility via item role."
                    permissions:
                      - "Overall/Read"
                    entries:
                      - group: "viewers"
                      # Example user
                      # - user: "john.doe@example.com"
                items:
                  - name: "developers"
                    description: "Developer permissions on all jobs (build, configure, workspace, cancel, replay)."
                    pattern: ".*"
                    templateName: "developers"
                    entries:
                      - group: "developers"
                      # Example user
                      # - user: "john.doe@example.com"
                  - name: "viewers"
                    description: "View-only access to jobs and views."
                    pattern: ".*"
                    templateName: "viewers"
                    entries:
                      - group: "viewers"
                      # Example user
                      # - user: "john.doe@example.com"
