# Argo Events Sensor for this chart's WorkflowTemplate (same EventSource `webhook` / `workflow-dispatch`).
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: webhook-aaos-builder
  namespace: {{ .Values.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  eventBusName: default
  template:
    serviceAccountName: sensor-submit-workflow
  dependencies:
    - name: webhook-dep
      eventSourceName: webhook
      eventName: workflow-dispatch
      filters:
        data:
          - path: body.workflowTemplateName
            type: string
            value:
              - {{ .Values.workflowTemplateName | quote }}
  triggers:
    - template:
        name: submit-aaos-builder
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: webhook-aaos-builder-
                namespace: {{ include "aaos-builder.workflowNamespace" . | quote }}
              spec:
                workflowTemplateRef:
                  name: {{ .Values.workflowTemplateName | quote }}
                arguments:
                  parameters:
                    - name: horizonSubmittedFrom
                    - name: lunchTarget
                    - name: androidRevision
                    - name: manifestUrl
                    - name: cleanBuild
                    - name: buildCtsOnly
                    - name: forceImageBuild
                    - name: storageLabels
                    - name: enableGeminiAiAssistant
                    - name: parallelSyncJobs
                    - name: pipelineRepoUrl
                    - name: pipelineRepoRevision
          parameters:
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedBy
              dest: metadata.annotations.horizon-sdv\.io/submitted-by
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: metadata.labels.horizon-sdv\.io/submitted-from
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.lunchTarget
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.androidRevision
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.manifestUrl
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.cleanBuild
              dest: spec.arguments.parameters.4.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.buildCtsOnly
              dest: spec.arguments.parameters.5.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.forceImageBuild
              dest: spec.arguments.parameters.6.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.storageLabels
              dest: spec.arguments.parameters.7.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.enableGeminiAiAssistant
              dest: spec.arguments.parameters.8.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.parallelSyncJobs
              dest: spec.arguments.parameters.9.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.pipelineRepoUrl
              dest: spec.arguments.parameters.10.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.pipelineRepoRevision
              dest: spec.arguments.parameters.11.value
