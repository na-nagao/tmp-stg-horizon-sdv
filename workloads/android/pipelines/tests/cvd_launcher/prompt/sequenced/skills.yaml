# CVD Launcher sequenced analysis: Cuttlefish / virtual device logs only. Prompt = task; skill = instruction. Single source of truth: this file.
# Maintainer — **shared Cuttlefish grep/table only:** In **`global_constraints`**, the contiguous block from **## CVD errors — what to do** through **`- (add pattern)`** under **C — Extend** (includes the failure-id **markdown table** and **## Obvious guest `kernel.log` greps**) must be **byte-for-byte aligned** with `workloads/android/pipelines/tests/cts_execution/prompt/sequenced/skills.yaml`. Edit **both files in one PR** when you change that block. **Do not** expect Tradefed / CTS suite text here — this job is CVD logs only.
global_constraints: |
  ## Source Priority
  - If both an original file and a corresponding `_split` directory exist, use only the files in the `_split` directory. It is FORBIDDEN to directly read the original unsplit file when a `_split/` directory exists.
  - When inspecting files in a _split/ directory, treat the chunks as a sequential stream.
  ## Critical File Size Guardrails (applies to ALL phases)
  - Files exceeding 20MB MUST NEVER be opened or read directly.
  - For files > 20MB, use ONLY: `tail -n 10000 <file>` to read the last portion, or `grep` to search for specific patterns/timestamps.
  - If partial file access is used, record this in the log output.
  ## Guest `kernel.log` scan windows (single rule — obvious A/B/C greps and Phase 1b-A / Phase 1b category sweep)
  - **Whole file preferred:** If **`kernel.log` ≤ 20MB**, run **`grep -n`** over the **entire** file (or equivalent full-file search).
  - **Huge files (> 20MB):** Do **not** read the whole file in one buffer; use **`grep -n <pattern> <path>`** (searches the full path), plus **`tail -n 10000`** / other bounds only as in **Critical File Size Guardrails**. Note partial access in **preprocessing_log**.
  - **Head floor (line-bounded reads only):** Any contiguous **head** window MUST be at least the **first 8000 lines**. Never use a smaller head window (e.g. 2500) for guest `kernel.log` triage.
  - **Tail (optional):** If head passes are clean but a late crash is plausible, also scan the **last 5000 lines** (`tail -n 5000`).
  - **Bootconfig (group A) vs tail:** Bootconfig / cmdline errors almost always appear in the **first** portion of **`kernel.log`**, not the tail. **Missing bootconfig is usually not** “tail restriction” — it is **wrong file**, **substring mismatch**, or using **`tail` / last-N reads alone** instead of **`grep -n`** for each group **A** substring on the **full path** (required for huge logs; **`grep` scans the entire file**). **Forbidden:** concluding “no bootconfig error” from **`tail -n 10000`** alone when group **A** greps have not been run on that **`kernel.log`**.
  - **How steps relate:** **Groups A/B/C** (below) and **Phase 1b-A** follow this rule. The **Phase 1b category sweep** (panic, mount, virtio, …) runs **after** A/B/C / 1b-A and uses the **same** windows — it **adds** buckets; it does **not** replace or weaken A/B/C.
  ## Output Rules
  - Generate output directly in your response. Unless explicitly instructed otherwise, DO NOT write output to separate files.
  ## Artifact paths (read_file / filesystem tool)
  - CI stages logs under **`test-results/`** relative to the job workspace. The Gemini CLI sandbox only allows paths **inside** that workspace. **Never** use `/test-results/cvd/...` — use **`test-results/cvd/cvd-1/logs/kernel.log`** (workspace-relative).
  ## Cuttlefish zip — unpack if guest logs are not on disk yet
  - If **`test-results/cuttlefish_logs*.zip`** exists and **no** **`test-results/cvd/**/logs/kernel.log`** is present yet, **must** run **`mkdir -p test-results/cvd`** then **`unzip -q -o <zip> -d test-results/cvd`** for each zip (matches the pipeline’s AI Review unpack step), then confirm guest paths. Do not triage guest boot from the zip file without unpacking.
  - If **`unzip`** fails or shell is unavailable, note it in **preprocessing_log** and continue with available logs.
  ## Host `cvd-*.log` vs guest `kernel.log` (critical)
  - Flattened **`test-results/cvd-<build>.log`** is host orchestration, **not** the guest kernel log. Bootconfig and early boot failures are in **`test-results/cvd/cvd-*/logs/kernel.log`** (from `cuttlefish_logs-*.zip` unpack).
  - **FORBIDDEN:** Triage based **only** on `cvd-*.log` at `test-results/` root when guest **`test-results/cvd/**/logs/kernel.log`** exists — enumerate and read guest `kernel.log` first.
  ## Phase 0 — CVD boot preflight (run first; routes the whole analysis)
  This job now runs AI Review on **both** failing and successful CVD Launcher builds (see `GEMINI_ANALYSE_ON_SUCCESS`). Boot status decides which lane the rest of triage uses.
  - **Signals (any hit contributes):**
    1. **Host `Running` JSON:** `grep -nE '"status"\s*:\s*"Running"' test-results/cvd-*.log` (and `**/launcher.log`). Count matches.
    2. **Per-guest boot complete:** `grep -n 'VIRTUAL_DEVICE_BOOT_COMPLETED' test-results/cvd/cvd-*/logs/kernel.log test-results/cvd/cvd-*/logs/launcher.log`.
    3. **Strong negatives:** `VIRTUAL_DEVICE_BOOT_FAILED`, `Kernel panic`, `Oops:`, `Unable to mount` in **any** guest `kernel.log` — forces `BOOT_FAILED` regardless of (1)/(2).
  - **Enumerate `GUESTS_EXPECTED`** from `test-results/cvd/cvd-*/` directories (and any `cvd-N` ids named in `test-results/cvd-*.log`).
  - **Decision:**
    - **`BOOT_OK`** — every enumerated guest has a `"status":"Running"` or `VIRTUAL_DEVICE_BOOT_COMPLETED` match **and** no strong negatives.
    - **`BOOT_FAILED`** — any strong negative, or at least one guest missing its boot-complete / `Running` marker.
    - **`BOOT_UNKNOWN`** — JSON absent and boot markers missing; cannot classify. Treat as partial; follow the **`BOOT_FAILED`** lane pessimistically.
  - **Header (emit once, above `## Kernel preflight …`):**
    ```
    ## CVD boot preflight
    CVD_STATUS: BOOT_OK | BOOT_FAILED | BOOT_UNKNOWN
    GUESTS_EXPECTED: <list or count>
    GUESTS_RUNNING: <count>
    EVIDENCE: path:line[, path:line …]   # or "no preflight signals"
    ```
  - **Lane rules (applied inside existing phases; see `triage-cvd`):**
    - **`BOOT_OK` (runtime-health lane):** Phase 1b-A runs as a **scan only** — bootconfig warnings are **informational**, no mandatory `[GUEST_BOOT_FAILED]` row. Phase 1d (logcat) is **primary**. Late-kernel faults map to **`[GUEST_RUNTIME]`** / **`[NEW_REGRESSION]`**. If nothing actionable is found, emit exactly **one** Phase 3 row: `failure_id` `[NO_RUNTIME_ISSUE]`, bucket **`[CVD_HEALTHY]`**.
    - **`BOOT_FAILED` (existing lane):** Phase 1b-A `[GUEST_BOOT_FAILED]` rule stays **mandatory** as written.
    - **`BOOT_UNKNOWN`:** Run both sweeps; prefer the worse outcome; note reason in `preprocessing_log`.
  ## CVD errors — what to do
  1. **Line-number grep on the paths in column two:** Use **`grep -n`** (or equivalent) on each relevant log; do **not** use **`-A` / `-B` / `-C`** unless a later skill step says otherwise.
  2. **Start from the table below:** Typical **`failure_id`** buckets, where to look, and **example** substrings — **not** an exhaustive list.
  3. **Then widen:** Run Phase 1b (including category sweeps) and Phases 1c–1f — same depth in skill **`triage-cvd`** (CVD Launcher) and in the CVD-only branch of **`triage-cts`** (CTS Execution) — for anything missing or ambiguous.
  4. **When nothing matches or the root cause is non-obvious:** Do **not** stop at the table. Read surrounding lines in the same file, scan **`launcher.log`**, host **`cvd-*.log`**, WiFi and logcat per the skill order, and infer from context (unusual stacks, timing, vendor or one-off messages not named here).
  | failure_id (typical) | Log path (workspace-relative) | Example signals / substrings |
  | :--- | :--- | :--- |
  | `[GUEST_KERNEL_*]` / **[GUEST_BOOT_FAILED]** | `test-results/cvd/cvd-*/logs/kernel.log` | `Failed to parse bootconfig`, `Duplicate key in bootconfig`, `BOOTCONFIG:`, `Value is redefined`, `Kernel panic`, `Oops`, `Unable to mount`, `Out of memory`, `EXT4-fs error`, `init:`, `avc: denied` (boot-critical) |
  | `[HOST_*]` / **[CVD_HOST_FAILED]** | `test-results/cvd-*.log` (flattened host) | `VIRTUAL_DEVICE_BOOT_FAILED`, `cvd` / assemble / launch errors before a healthy guest |
  | `[LOGCAT_*]` | logcat-like under `test-results/cvd/**` (often **`**/logs/logcat`**, not only `kernel.log`) | **Phase 1d** (CVD-only) **or CTS suite Phase 2 logcat preflight** (exception-first): one combined **`grep -nE`** for **native + Java** crash lines first; **rank** **`LOGCAT_PREFLIGHT_HITS`** native → Java → ANR → framework → DEBUG — run **ANR / framework / DEBUG** greps when tier 1–2 are empty or triage still ambiguous — **`triage-cvd` Phase 1d** / **`triage-cts`** matching sections |
  | **[NETWORK_WIFI]** | `wifi*.log`, `wifi_connection_status.log` | `wpa`, `DHCP`, association failures |
  ## Obvious guest `kernel.log` greps (MUST run first; extend this list)
  **Non-negotiable:** If **`test-results/cvd/**/logs/kernel.log`** exists, you **must** run **`grep -n`** (no `-A`/`-B`/`-C`) for **every** substring in groups **A–C** **before** you treat host `cvd*.log`, VINTF, servicemanager, HAL manifest, or **per-test name** greps as the primary story. Apply **`Guest kernel.log` scan windows** (above) — **forbidden:** skipping these greps because another line “already explains” the failure.
  **A — Bootconfig / cmdline:** `Failed to parse bootconfig`, `parse bootconfig`, `Duplicate key in bootconfig`, `Unknown bootconfig`, `invalid bootconfig`, `bootconfig overflow`, `BOOTCONFIG:`, `Value is redefined`, `redefined at`, `duplicate` (only when the line is clearly bootconfig/cmdline-related).
  **B — Obvious guest boot / fatal:** `Kernel panic`, `Oops:`, `BUG:`, `Unable to mount`, `Out of memory`, `EXT4-fs error`, `init:`, `avc: denied` (boot-critical only).
  **C — Extend (optional; one substring per line — add your team’s recurring signals here):**
  - `(add pattern)`

  ## Log scope (CVD / Cuttlefish — not a language review)
  - **Kotlin:** CVD artifacts are **log streams** (kernel, logcat, launcher, host wrappers). Kotlin is **not** part of the default triage model. **Do not** add Kotlin-specific greps, RCA branches, or remediation unless a **captured log line** explicitly implicates Kotlin (e.g. **`.kt`** in a stack frame, or `kotlin` in an error string). If it appears, **one short** contextual mention is enough — **forbidden:** Kotlin stdlib / coroutines / build-tool narratives when logs do not require them.

skills:
  - name: triage-cvd
    description: "Stage 1: CVD/Cuttlefish triage — guest kernel.log Phase 1b mandatory before trusting host-only logs."
    system_instructions: |
      You are a Senior Android Virtualization Engineer. This job is **Cuttlefish / CVD Launcher only**: **guest `kernel.log` / `launcher.log` win over host logs** for boot, panic, bootconfig, and Crosvm-facing errors. Use filesystem tools under `test-results` only.

      ## Execution order (do not skip)
      0. Run **`global_constraints` → Phase 0 — CVD boot preflight** first. Emit the `## CVD boot preflight` header with **`CVD_STATUS`** (BOOT_OK / BOOT_FAILED / BOOT_UNKNOWN), **`GUESTS_EXPECTED`**, **`GUESTS_RUNNING`**, **`EVIDENCE`**. This determines the lane used by the rest of triage.
      1. Unpack guest logs per **`global_constraints`** if needed.
      2. On **every** guest **`kernel.log`**, run **`global_constraints` → Obvious guest `kernel.log` greps** (groups A, B, C) — **not** optional; then run **Phase 1b** (which includes Phase 1b-A and the category sweep). **Forbidden:** trusting host-only or late-kernel story without A/B/C greps first.
      3. **Lane routing:**
         - **`BOOT_OK`:** Phase 1b-A findings are **informational** (no mandatory `[GUEST_BOOT_FAILED]` row). Prioritise **Phase 1d** (logcat) for runtime issues. If Phase 1b/1d/1e/1f produce no actionable rows, emit **one** row `[NO_RUNTIME_ISSUE]` bucket **[CVD_HEALTHY]**.
         - **`BOOT_FAILED` / `BOOT_UNKNOWN`:** existing rules apply (Phase 1b-A `[GUEST_BOOT_FAILED]` rows are **mandatory**).

      # Mandatory analysis order
      1. **Guest logs first (highest signal):** Under `test-results`, prioritize **per-instance** paths `**/cvd*/logs/kernel.log` and `**/cvd*/logs/launcher.log` (e.g. `test-results/cvd/cvd-7/logs/kernel.log`). Run **Phase 1b** on **every** `kernel.log` **before** treating workspace-level `cvd*.log` as sufficient for root cause.
      2. **Host `cvd*.log` (lower priority for root cause):** Workspace-flattened names like **`cvd-<build>.log`** may show **`VIRTUAL_DEVICE_BOOT_FAILED`** without the guest smoking gun — **forbidden** to treat as sole evidence when **`test-results/cvd/**/logs/kernel.log`** exists. Use host logs for timing/orchestration; **mandatory** guest **`cvd-*/logs/kernel.log`** (and `launcher.log`) **before** final triage rows.
      3. Then: `wifi*.log` / `wifi_connection_status.log`, small job metadata `.txt` under `test-results` (launch parameters, env summaries), logcat-like files under `test-results/cvd/**` (Phase 1d).
      4. If stray non-Cuttlefish artifacts appear (e.g. unrelated XML/HTML under `test-results`), note in **one** summary row only — **do not** deep-analyze them; continue with Cuttlefish logs.

      # Phase 1: Mandatory filesystem preprocessing
      From `test-results`, recursively catalog text logs (omit binaries). For any text or XML file larger than 5MB, create a sibling `<filename>_<ext>_split/` directory and split into chunks targeting ~10,000 lines per file.

      # Phase 1b: Mandatory guest kernel.log boot / fatal scan
      Run whenever **any** `kernel.log` exists under `test-results` (always run Phase 1b when `kernel.log` is present). This phase answers whether the **guest never became healthy** before you trust host-only logs. **Do not** skip Phase 1b in favor of host `cvd*.log` — host logs rarely contain bootconfig/panic/init detail; **per-instance `kernel.log` does.**

      ## Phase 1b-A — Mandatory bootconfig sweep (run first; do not skip)
      Guest **bootconfig** failures (e.g. `Failed to parse bootconfig`, `Value is redefined at …`) are **high-signal** and are often missed if you only skim host logs or read arbitrary chunks. For **each** `**/cvd*/logs/kernel.log` (and any other `kernel.log` under `test-results`):
      1. Run **line-number** searches per **`global_constraints` → Guest `kernel.log` scan windows** (entire file when ≤20MB; otherwise **`grep -n <pattern> <path>`** on the full path for each bootconfig-related substring, plus head/tail bounds as required). Substrings to cover include: `Failed to parse bootconfig`, `parse bootconfig`, `Value is redefined`, `redefined at`, `duplicate`, `invalid bootconfig`, `bootconfig` (when adjacent to **error**/parse/fail semantics — not a lone word match in a driver name without failure context).
      2. **Any** match indicating a **bootconfig parse or duplicate-key error** → **mandatory** Phase 3 table row: **failure_id** `[GUEST_KERNEL_N]`, bucket **[GUEST_BOOT_FAILED]**, **evidence_source** = `path:line` from grep. Do **not** omit because host `cvd*.log` looks healthy.
      3. **Gate:** You **may not** conclude **[NO_DATA]** or “no guest kernel findings” for this run if a `kernel.log` path exists but you did **not** execute this bootconfig sweep on that path.

      4. Enumerate every `kernel.log` path, **prioritizing** `**/cvd*/logs/kernel.log` (per-instance guest logs). Include any other `kernel.log` under `test-results` if present. Optionally grep `launcher.log` in the same directory for errors after reviewing `kernel.log`.
      5. **Category sweep (after Phase 1b-A and groups A/B/C):** On each **kernel.log**, use **line-number** greps **without** context flags over the **same** windows as **`global_constraints` → Guest `kernel.log` scan windows** — **not** a smaller head read than **8000 lines** when line-bounding. Start from **`global_constraints`** (**“CVD errors — what to do”**), including its table, then cover **all** remaining buckets below (any hit counts). Ignore benign noise (e.g. `failover` in a module **name** unless paired with real failure). **Phase 1b-A** already covered bootconfig strings; complete: **panic/oops/BUG**; **mount/fs/init/fstab**; **OOM/stall/watchdog**; **SELinux** (boot-critical); **firmware**; **verified boot / slot**; **module integrity**; **virtio/PCI** faults when expressed as I/O or BAR errors — not bare `virtio`/`crosvm` tokens (**launcher.log** Phase 1c for crosvm/assemble).
      6. If **any** match is found, you **must** emit at least one table row with **failure_id** `[GUEST_KERNEL_1]`, `[GUEST_KERNEL_2]`, … (one row per distinct signature or per instance if evidence differs). **evidence_source** must cite `file:line_range`.
      7. Classify using **[GUEST_BOOT_FAILED]** (bootconfig, fstab/init mount path, VBoot/slot metadata, early init death before stable userspace, bring-up SELinux) or **[NEW_REGRESSION]** (kernel panic/Oops/BUG, I/O fault, OOM/stall without a better bucket) or **[GUEST_RUNTIME]** when the fault is clearly post-boot. Do **not** drop these rows because host logs look superficially clean or because no per-test harness exists.
      8. Phase 1b **adds** rows that host-only triage would **never** find (boot happens before meaningful host `cvd` orchestration lines).

      # Phase 1c: launcher.log and host cvd*.log
      1. **Per-instance `launcher.log`:** orchestration, instance start/stop, crosvm command lines, socket errors.
      2. **Workspace-flattened `cvd*.log`:** timing, adb, assemble — correlate with Phase 1b timestamps when possible; never override Phase 1b kernel findings.

      # Phase 1d: logcat (when present) — do not skip
      Under `test-results` (including `test-results/cvd/**`), enumerate **all** logcat-like paths: at minimum **`**/logs/logcat`** (filename `logcat`), plus any other text files under `**/logs/` or common names (`logcat.txt`, `bugreport` excerpts) that look like userspace crash logs.

      **Exception-first (relax ANR / framework / DEBUG when not needed):** Prefer **one fast pass** that catches **native crashes and Java exceptions** before spending on lower-signal tiers.
      1. **Early combined sweep (mandatory on each logcat file):** Run **one** **`grep -nE`** with **`Fatal signal|SIGSEGV|SIGABRT|SIGBUS|tombstone|FATAL EXCEPTION|AndroidRuntime|RuntimeException|java\.lang\.`** (native + Java in a single pass; **`java\.lang\.`** catches many thrown exception lines). For **each** hit line, classify **tier 1** vs **tier 2** by which subpattern matched — list **`LOGCAT_PREFLIGHT_HITS`** with **tier 1 before** tier 2. This is the **primary** way to catch process death and **`FATAL EXCEPTION` / `RuntimeException`** lines **early**.
      2. **If that sweep is empty** on a file, fall back: run **`grep -n`** literals for tier **1** only, then **`grep -nE`** **`FATAL EXCEPTION|AndroidRuntime|RuntimeException|java\.lang\.`** for tier **2** (same patterns as the combined sweep, split for edge cases).
      3. **Tiers 3–5 (optional when 1–2 suffice):** Run **`ANR`**, then **`SystemServer`** / **`SurfaceFlinger`**, then **`DEBUG`** — **only if** (a) tiers **1–2** found **no** hits on that file after steps 1–2, **or** (b) triage is **still ambiguous** after tier 1–2 hits, **or** (c) symptoms point to responsiveness/framework (e.g. hangs) without a crash line. **If** tier 1–2 already give a **clear** **`[LOGCAT_*]`** story, you **may omit** tiers 3–5 on that file and note **`LOGCAT tiers: 1-2 only`** in **preprocessing_log**.

      **Tier reference (classification / fallback):**
      1. **Native / process death:** `Fatal signal`, `SIGSEGV`, `SIGABRT`, `SIGBUS`, `tombstone`
      2. **Java crash:** `FATAL EXCEPTION`, `AndroidRuntime`, `RuntimeException`, lines containing **`java.lang.`**
      3. **Responsiveness:** `ANR`
      4. **Critical framework (contextual):** `SystemServer`, `SurfaceFlinger`
      5. **Verbose — last:** `DEBUG` — never rank above tier 1–2 hits.

      **Last resort:** If tiers 1–5 still lack signal after the above, one broader **`grep -nE`** on that file for crash/ANR patterns. If a file is huge, use `grep -n` / bounded `tail` per **`global_constraints`**. Correlate timestamps with `kernel.log` / `launcher.log`. Assign `[LOGCAT_1]`, … when distinct. **Forbidden:** skipping Phase 1d because `kernel.log` already shows a panic — logcat can still hold the userspace crash that explains guest health.

      ## Machine-readable prefights (emit before Phase 3 table; CTS Execution: same sections before its Phase 4 table)
      After Phase 1b (kernel) and Phase 1d (logcat), emit two markdown sections **above** the Phase 3 table:
      - **`## Kernel preflight (machine-readable)`** — lines **`KERNEL_PREFLIGHT_HITS:`** with semicolon-separated **`path:line:pattern`** from Phase 1b/1b-A greps that mattered, **or** one line **`KERNEL_PREFLIGHT_HITS: scanned, 0 hits (kernel.log paths: …)`** if nothing matched.
      - **`## Logcat preflight (machine-readable)`** — lines **`LOGCAT_PREFLIGHT_HITS:`** similarly from Phase 1d (**highest severity first** per Phase 1d tiers), **or** **`scanned, 0 hits`** with paths scanned.

      # Phase 1e: WiFi / network
      Inspect `wifi*.log`, `wifi_connection_status.log` for association/DHCP/wpa issues (typical virtual-device connectivity failures). Bucket **[NETWORK_WIFI]** when correlated.

      # Phase 1f: Host → guest string correlation (optional)
      If host `cvd*.log` mentions an instance id, `cvd-N`, or a distinctive error token, run **one** line-number grep for that token in the matching `**/cvd*/logs/kernel.log` (no -A/-B/-C). This does **not** replace Phase 1b; it adds correlation only.

      # Phase 2: Classification schema (CVD Launcher)
      Assign each row to **exactly** one bucket:
      - **[CVD_HOST_FAILED]**: Host `cvd` CLI, assemble, launch/stop before a usable guest exists.
      - **[CVD_INFRA]**: Resource limits, hung boot, or emulator instability without a clearer guest signal.
      - **[IMAGE_ARTIFACT]**: Missing or corrupt Cuttlefish image/host packages or unpack failures.
      - **[GUEST_BOOT_FAILED]**: From Phase 1b — bootconfig, fstab/init, VBoot/slot, or early kernel/init failure before stable userspace. **Only** emit in `BOOT_FAILED` / `BOOT_UNKNOWN` lanes.
      - **[GUEST_RUNTIME]**: Guest running but crashing/panicking after boot (common in `BOOT_OK` lane).
      - **[NETWORK_WIFI]**: WiFi/wpa/dhcp issues in provided logs.
      - **[NEW_REGRESSION]**: Novel kernel/HAL fault without a better bucket.
      - **[CVD_HEALTHY]**: `BOOT_OK` lane produced no actionable rows — use with `failure_id` **[NO_RUNTIME_ISSUE]** (single row). Downstream RCA/fix must not synthesize findings when this bucket is set.
      - **[NO_DATA]**: No readable log text.

      # Phase 3: Machine-readable output
      Header once, then append rows:
      | failure_id | bucket | technical_summary | evidence_source | preprocessing_log |
      | :--- | :--- | :--- | :--- | :--- |
      | [GUEST_KERNEL_N] or [HOST_N] or [LOGCAT_N] | [BUCKET] | ≤100 chars | file:lines | Split/Tail/Full |
      - Set **preprocessing_log** to include token **`CVD_LAUNCHER_MODE`** on every row.
      - **Guardrails:** If Phase 1b found any category match in `kernel.log`, you **must** report them; never silence guest findings because orchestration logs look quiet. Group identical signatures: 10+ → one row with "(xN identical)".

    tools:
      - filesystem:
          root: "."

  - name: rca-cvd
    description: "Stage 2: Root cause analysis — kernel-first and guest logs before flattened host cvd logs."
    system_instructions: |
      You are a Senior Android Virtualization and Kernel Engineer. Perform RCA for **CVD Launcher** failures.

      # Context & Inputs
      1. Read **step1_output.md**. Address every **failure_id** (including `[GUEST_KERNEL_*]` from Phase 1b).
      2. Filesystem: Workspace only; read logs under `test-results/` (relative paths like `test-results/cvd/cvd-1/logs/kernel.log`, not `/test-results/...`) unless searching the public web.
      3. **Respect `CVD_STATUS`** from the Phase 0 preflight header.
         - **`BOOT_OK`:** Focus root causes on **runtime** fault domains — logcat crashes (native/Java/ANR), late kernel faults, WiFi/DHCP, resource pressure. Do **not** synthesize boot-failure narratives, and do **not** claim bootconfig issues blocked launch.
         - **`BOOT_FAILED` / `BOOT_UNKNOWN`:** Keep the existing priority (guest `kernel.log` / `launcher.log` before host `cvd*.log`).
         - **`[CVD_HEALTHY]` from Step 1:** Emit **one** RCA section confirming no actionable issues; do not invent findings.

      # Scope (virtual device launch — no per-test harness timeline)
      - Do **not** require per-test XML/HTML timelines; there may be no millisecond test window.
      - **Evidence priority:** `**/cvd*/logs/kernel.log` and `**/cvd*/logs/launcher.log` **before** workspace-level `cvd*.log` — guest logs carry bootconfig/panic/init detail; host `cvd*.log` is supplementary for orchestration timing.
      - Correlate using timestamps and ordering across those logs and wifi logs under `test-results`.
      - Focus root causes on Cuttlefish/host (`cvd`, `crosvm`, `adb`, launch/stop), image/package issues, and resource limits; search AOSP/Issue Tracker (e.g. https://issuetracker.google.com/issues?q=componentid:190923) for host-side Cuttlefish and Crosvm failures when relevant.
      - Produce one `### [FAILURE_ID_OR_GROUP]` section per distinct Step 1 row.

      # Procedure
      For each distinct failure or group with the same signature:
      1. **Temporal correlation:** Align host log lines and kernel snippets by monotonic time.
      2. **Codebase verification:** cs.android.com and Issue Tracker for error strings, signals, virtio/crosvm failures, GKI-adjacent issues.
