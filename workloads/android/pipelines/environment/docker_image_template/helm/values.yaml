## Description:
## Default values for the AAOS docker image workflow Helm chart.
## Usage:
## 1) Apply: helm template aaos-builder-runtime-image workloads/android/pipelines/environment/docker_image_template/helm | kubectl apply -f -
# Namespace: if `namespace` is non-empty, use it; else `namespacePrefix` + "workflows" (e.g. namespacePrefix: "dev-" → dev-workflows; matches GitOps config.namespacePrefix).
namespacePrefix: ""
namespace: ""
# Set by GitOps (userpass | app | none). Remote: ClusterWorkflowTemplate prepare-pipeline-git-creds runs before git fetch.
git:
  authMethod: ""
workflowTemplateName: aaos-builder-runtime-image
# Argo Events Sensor: templates/workflow/sensors.yaml.
# Name of the shared ClusterWorkflowTemplate (from workloads/common/common_docker_image).
clusterWorkflowTemplateName: common-docker-image-build
# Pod GC for workflow task pods (matches aaos-builder cleanup behavior).
# Strategy options follow Argo podGC (e.g., OnPodCompletion, OnWorkflowCompletion).
podGcStrategy: OnWorkflowCompletion
# TTL in seconds after completion; leave empty to retain workflow records.
# Set a number (e.g., 60) to auto-delete workflows after completion.
workflowTtlSecondsAfterCompletion:
# When set, cloudProject / cloudRegion / cloudZone WorkflowTemplate parameters resolve from
# this ConfigMap (keys CLOUD_PROJECT, CLOUD_REGION, CLOUD_ZONE) instead of spec.cloud* — same
# source as gitops/templates/argo-workflows-init.yaml horizon-workflow-cloud-env. Use "" for local
# clusters without that ConfigMap (falls back to spec.cloudProject, etc.).
cloudEnvConfigMapName: "horizon-workflow-cloud-env"

spec:
  # Target project/region/zone. Chart defaults for local helm; GitOps workloads-android overrides from config.projectID, .region, .zone (align with horizon-workflow-cloud-env / cluster).
  cloudProject: sdva-2108202401
  cloudRegion: europe-west1
  cloudZone: europe-west1-d
  # Docker image path under the artifact registry.
  dockerArtifactPathName: horizon-sdv/aaos-builder
  # When true, do not push built images.
  dryRun: "false"
  # Image tag to build/push. Default argowf-latest avoids clobbering a shared :latest in Artifact Registry.
  imageTag: "argowf-latest"
  dockerfileDir: workloads/android/pipelines/environment/docker_image_template
  # Base image used in the Dockerfile build.
  linuxDistribution: ubuntu:22.04
  nodejsVersion: "25.2.1"
  gcloudCliVersion: "545.0.0-0"
  kubectlVersion: "1:545.0.0-0"
  enableGeminiAiAssistant: "true"
  geminiCliVersion: "latest"
  # Non-local: align with gitops config.workloads.android.url / .branch.
  # Platform GitOps: workloads-android Application (gitops/modules/workloads-android via Module Manager); CWT common-docker-image-build from module workloads-common.
  pipelineRepoUrl: ""
  pipelineRepoRevision: ""
  # Optional Secret for private HTTPS when scm.authMethod is pat. app uses per-run {{workflow.uid}}-pipeline-git-creds.
  pipelineRepoSecret: ""
  # When true, pods use workflow-executor-elevated (Terraform sdv_wi_service_accounts argo_workflows_elevated → gke-argo-workflows-elevated-sa). When false, use serviceAccountName below (argo_workflows → gke-argo-workflows-sa).
  useElevatedWorkflowIam: true
  serviceAccountName: workflow-executor
