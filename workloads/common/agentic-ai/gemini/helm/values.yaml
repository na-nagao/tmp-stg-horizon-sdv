# Default values for the ai-review WorkflowTemplate (chart path workloads/common/agentic-ai/gemini/helm).
# Deployed as a source on the workloads-android Module Manager Application (namespace workflows).
namespacePrefix: ""
namespace: ""

workflowTemplateName: ai-review
# Argo Events Sensor: templates/sensors.yaml.

# Pod resources for the ai-review template (Vertex/Gemini CLI).
resources:
  requests:
    cpu: "16000m"
    memory: "48Gi"
  limits:
    cpu: "32000m"
    memory: "96Gi"
