# Argo Events Sensor for this chart's WorkflowTemplate (same EventSource `webhook` / `workflow-dispatch`).
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: webhook-{{ .Values.workflowTemplateName }}
  namespace: {{ .Values.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  eventBusName: default
  template:
    serviceAccountName: sensor-submit-workflow
  dependencies:
    - name: webhook-dep
      eventSourceName: webhook
      eventName: workflow-dispatch
      filters:
        data:
          - path: body.workflowTemplateName
            type: string
            value:
              - {{ .Values.workflowTemplateName | quote }}
  triggers:
    - template:
        name: submit-ai-review
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: webhook-ai-review-
                namespace: {{ include "gemini.workflowNamespace" . | quote }}
              spec:
                workflowTemplateRef:
                  name: {{ .Values.workflowTemplateName | quote }}
                arguments:
                  parameters:
                    - name: horizonSubmittedFrom
                    - name: sdkAndroidVersion
                    - name: pipelineRepoRoot
                    - name: cloudProject
                    - name: cloudRegion
                    - name: geminiPromptFile
                    - name: geminiPromptFile2
                    - name: geminiPromptFile3
                    - name: geminiLocationGlobal
                    - name: geminiPreviewFeatures
                    - name: geminiCommandLine
                    - name: geminiAiExecutionTimeoutHours
                    - name: geminiSkillsYaml
                    - name: image
          parameters:
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedBy
              dest: metadata.annotations.horizon-sdv\.io/submitted-by
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: metadata.labels.horizon-sdv\.io/submitted-from
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.sdkAndroidVersion
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.pipelineRepoRoot
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.cloudProject
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.cloudRegion
              dest: spec.arguments.parameters.4.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiPromptFile
              dest: spec.arguments.parameters.5.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiPromptFile2
              dest: spec.arguments.parameters.6.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiPromptFile3
              dest: spec.arguments.parameters.7.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiLocationGlobal
              dest: spec.arguments.parameters.8.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiPreviewFeatures
              dest: spec.arguments.parameters.9.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiCommandLine
              dest: spec.arguments.parameters.10.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiAiExecutionTimeoutHours
              dest: spec.arguments.parameters.11.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.geminiSkillsYaml
              dest: spec.arguments.parameters.12.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.image
              dest: spec.arguments.parameters.13.value
