# Namespaced WorkflowTemplate for AI review (Gemini). Deployed with workloads-android; not Horizon-exposed.
# Argo Events: Sensor webhook-{{ .Values.workflowTemplateName }} (templates/sensors.yaml). Horizon: adjust horizon-sdv.io/expose / module labels above.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: {{ .Values.workflowTemplateName | quote }}
  namespace: {{ include "gemini.workflowNamespace" . | quote }}
  labels:
    app.kubernetes.io/name: gemini-ai-review
    horizon-sdv.io/expose: "false"
    horizon-sdv.io/module: workloads-android
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  entrypoint: ai-review
  # Same as aaos-builder / runtime-image WT: archive main container logs to the cluster artifact repo (GCS) per step.
  archiveLogs: true
  templates:
    - name: ai-review
      # Keep AI review pod on the same node as other workflow pods that use the cache PVC.
      podSpecPatch: |
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: workflows.argoproj.io/workflow
                      operator: In
                      values:
                        - {{ "{{" }}workflow.name{{ "}}" }}
                topologyKey: kubernetes.io/hostname
      inputs:
        parameters:
          - name: horizonSubmittedFrom
          - name: sdkAndroidVersion
          - name: pipelineRepoRoot
          - name: cloudProject
          - name: cloudRegion
          - name: geminiPromptFile
          - name: geminiPromptFile2
          - name: geminiPromptFile3
          - name: geminiLocationGlobal
          - name: geminiPreviewFeatures
          - name: geminiCommandLine
          - name: geminiAiExecutionTimeoutHours
          - name: geminiSkillsYaml
          - name: image
        artifacts:
          - name: pipeline-repo
            path: /workspace
            optional: true
      container:
        image: "{{ "{{" }}inputs.parameters.image{{ "}}" }}"
        workingDir: "{{ "{{" }}inputs.parameters.pipelineRepoRoot{{ "}}" }}"
        command: [bash, -euo, pipefail, -c]
        env:
          - name: WORKSPACE
            value: "{{ "{{" }}inputs.parameters.pipelineRepoRoot{{ "}}" }}"
          - name: PIPELINE_REPO_ROOT
            value: "{{ "{{" }}inputs.parameters.pipelineRepoRoot{{ "}}" }}"
          - name: CLOUD_PROJECT
            value: "{{ "{{" }}inputs.parameters.cloudProject{{ "}}" }}"
          - name: CLOUD_REGION
            value: "{{ "{{" }}inputs.parameters.cloudRegion{{ "}}" }}"
          - name: ANDROID_VERSION
            value: "{{ "{{" }}inputs.parameters.sdkAndroidVersion{{ "}}" }}"
          - name: SDK_ANDROID_VERSION
            value: "{{ "{{" }}inputs.parameters.sdkAndroidVersion{{ "}}" }}"
          - name: GEMINI_PROMPT_FILE
            value: "{{ "{{" }}inputs.parameters.geminiPromptFile{{ "}}" }}"
          - name: GEMINI_PROMPT_FILE_2
            value: "{{ "{{" }}inputs.parameters.geminiPromptFile2{{ "}}" }}"
          - name: GEMINI_PROMPT_FILE_3
            value: "{{ "{{" }}inputs.parameters.geminiPromptFile3{{ "}}" }}"
          - name: GEMINI_LOCATION_GLOBAL
            value: "{{ "{{" }}inputs.parameters.geminiLocationGlobal{{ "}}" }}"
          - name: GEMINI_PREVIEW_FEATURES
            value: "{{ "{{" }}inputs.parameters.geminiPreviewFeatures{{ "}}" }}"
          - name: GEMINI_COMMAND_LINE
            value: "{{ "{{" }}inputs.parameters.geminiCommandLine{{ "}}" }}"
          - name: GEMINI_AI_EXECUTION_TIMEOUT_HOURS
            value: "{{ "{{" }}inputs.parameters.geminiAiExecutionTimeoutHours{{ "}}" }}"
          - name: GEMINI_SKILLS_YAML
            value: "{{ "{{" }}inputs.parameters.geminiSkillsYaml{{ "}}" }}"
          - name: GEMINI_STEP2_PRIOR_CONTEXT_BYTES
            value: "131072"
        resources:
{{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          privileged: true
        volumeMounts:
          - name: aaos-cache
            mountPath: /aaos-cache
          - name: local-repo
            mountPath: /workspace-local
        args:
          - |
            set +ex
            REPO_ROOT="${PIPELINE_REPO_ROOT:-/workspace}"
            export REPO_ROOT
            GEMINI_ANALYSIS_PATH="/aaos-cache/aaos_builds"
            echo "Analysis path: ${GEMINI_ANALYSIS_PATH}"
            cp -f aaos-build*.* "${GEMINI_ANALYSIS_PATH%/}/" 2>/dev/null || true
            cd "${GEMINI_ANALYSIS_PATH%/}" || true
            [ -f aaos-build.log ] && tail -n 2500 aaos-build.log > aaos-build.log.tail 2>/dev/null || true
            GEMINI_PROMPT_FILE="${GEMINI_PROMPT_FILE:-}"
            case "${GEMINI_PROMPT_FILE}" in
              /workspace/*) export GEMINI_PROMPT_FILE="${REPO_ROOT}${GEMINI_PROMPT_FILE#/workspace}" ;;
            esac
            GEMINI_PROMPT_FILE_2="${GEMINI_PROMPT_FILE_2:-}"
            GEMINI_PROMPT_FILE_3="${GEMINI_PROMPT_FILE_3:-}"
            case "${GEMINI_PROMPT_FILE_2}" in /workspace/*) GEMINI_PROMPT_FILE_2="${REPO_ROOT}${GEMINI_PROMPT_FILE_2#/workspace}" ;; esac
            case "${GEMINI_PROMPT_FILE_3}" in /workspace/*) GEMINI_PROMPT_FILE_3="${REPO_ROOT}${GEMINI_PROMPT_FILE_3#/workspace}" ;; esac
            export GEMINI_PROMPT_FILE_2 GEMINI_PROMPT_FILE_3
            case "${GEMINI_SKILLS_YAML}" in
              /workspace/*) export GEMINI_SKILLS_YAML="${REPO_ROOT}${GEMINI_SKILLS_YAML#/workspace}" ;;
            esac
            GEMINI_LOCATION_GLOBAL="${GEMINI_LOCATION_GLOBAL:-true}"
            GEMINI_PREVIEW_FEATURES="${GEMINI_PREVIEW_FEATURES:-true}"
            [ "${GEMINI_LOCATION_GLOBAL}" = "true" ] && export GOOGLE_CLOUD_LOCATION="global" || export GOOGLE_CLOUD_LOCATION="${CLOUD_REGION}"
            export GOOGLE_CLOUD_PROJECT="${CLOUD_PROJECT}"
            export GEMINI_COMMAND_LINE="${GEMINI_COMMAND_LINE}"
            "${REPO_ROOT}"/workloads/common/agentic-ai/gemini/gemini_initialise.sh
            timeout "${GEMINI_AI_EXECUTION_TIMEOUT_HOURS}"h "${REPO_ROOT}"/workloads/common/agentic-ai/gemini/gemini_analysis.sh
            GEMINI_EXIT_CODE="$?"
            repo forall -c 'git checkout -- .; git clean -xfd;' >/dev/null 2>&1 || true
            rm -f "${GEMINI_ANALYSIS_PATH%/}/aaos-build.log.tail" 2>/dev/null || true
            cd - || true
            source "${REPO_ROOT}/workloads/common/agentic-ai/gemini/gemini_environment.sh" && \
                     move_gemini_artifacts "${GEMINI_ANALYSIS_PATH%/}" "${REPO_ROOT}" || true
            find . -type f -name "headless*.json" -size 0 -delete || true
            if [ -f "${GEMINI_ANALYSIS_PATH%/}/gemini-client-error.zip" ] || [ -f "${REPO_ROOT}/gemini-client-error.zip" ]; then
              echo "ERROR: Gemini AI assistant reported errors (gemini-client-error.zip present)"
              GEMINI_EXIT_CODE=1
            fi
            set -e
            exit ${GEMINI_EXIT_CODE}
