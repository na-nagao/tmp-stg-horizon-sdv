# Argo Events Sensor for ClusterWorkflowTemplate {{ .Values.clusterWorkflowTemplateName }} (same EventSource `webhook` / `workflow-dispatch`).
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: webhook-common-docker-image-build
  namespace: {{ .Values.namespacePrefix }}argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  eventBusName: default
  template:
    serviceAccountName: sensor-submit-workflow
  dependencies:
    - name: webhook-dep
      eventSourceName: webhook
      eventName: workflow-dispatch
      filters:
        data:
          - path: body.workflowTemplateName
            type: string
            value:
              - {{ .Values.clusterWorkflowTemplateName | quote }}
  triggers:
    - template:
        name: submit-common-docker-image-build
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: webhook-common-docker-
                namespace: {{ printf "%s%s" (.Values.namespacePrefix | default "") "workflows" | quote }}
              spec:
                entrypoint: build
                workflowTemplateRef:
                  name: {{ .Values.clusterWorkflowTemplateName | quote }}
                  clusterScope: true
                arguments:
                  parameters:
                    - name: horizonSubmittedFrom
                    - name: cloudProject
                    - name: cloudRegion
                    - name: dockerArtifactPathName
                    - name: imageTag
                    - name: dryRun
                    - name: dockerCredentialsUrl
                    - name: buildkitReleaseTag
                    - name: dockerfileDir
                    - name: buildArgs
                    - name: platform
                    - name: registryAuthInsecure
          parameters:
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedBy
              dest: metadata.annotations.horizon-sdv\.io/submitted-by
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: metadata.labels.horizon-sdv\.io/submitted-from
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.cloudProject
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.cloudRegion
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.dockerArtifactPathName
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.imageTag
              dest: spec.arguments.parameters.4.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.dryRun
              dest: spec.arguments.parameters.5.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.dockerCredentialsUrl
              dest: spec.arguments.parameters.6.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.buildkitReleaseTag
              dest: spec.arguments.parameters.7.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.dockerfileDir
              dest: spec.arguments.parameters.8.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.buildArgs
              dest: spec.arguments.parameters.9.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.platform
              dest: spec.arguments.parameters.10.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.registryAuthInsecure
              dest: spec.arguments.parameters.11.value
